<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "tertiary": "#6a5c5b",
          "primary": "#805449",
          "secondary-fixed": "#ebe1d6",
          "on-surface": "#37331c",
          "on-error": "#fff7f6",
          "on-background": "#37331c",
          "on-tertiary-fixed-variant": "#6d5f5f",
          "on-tertiary": "#fff7f6",
          "secondary-fixed-dim": "#ddd3c9",
          "inverse-on-surface": "#a29d8c",
          "surface": "#fff9ec",
          "tertiary-fixed": "#fde9e8",
          "surface-container-high": "#f0e8cb",
          "primary-fixed": "#fec4b5",
          "surface-container-lowest": "#ffffff",
          "surface-container-highest": "#ebe3c2",
          "tertiary-container": "#fde9e8",
          "error": "#a83836",
          "primary-dim": "#72493d",
          "primary-fixed-dim": "#efb7a8",
          "secondary-dim": "#59524a",
          "on-primary": "#fff7f6",
          "on-secondary-fixed": "#443e37",
          "outline-variant": "#bab294",
          "secondary": "#655e56",
          "primary-container": "#fec4b5",
          "tertiary-dim": "#5d504f",
          "surface-variant": "#ebe3c2",
          "surface-container-low": "#fbf3db",
          "inverse-surface": "#100e05",
          "outline": "#817b5f",
          "tertiary-fixed-dim": "#eedbda",
          "on-secondary": "#fff8f2",
          "surface-container": "#f6eed3",
          "on-tertiary-fixed": "#504343",
          "error-container": "#fa746f",
          "on-primary-fixed-variant": "#6f463b",
          "on-primary-container": "#653d32",
          "error-dim": "#67040d",
          "background": "#fff9ec",
          "on-secondary-container": "#575149",
          "on-tertiary-container": "#635555",
          "surface-tint": "#805449",
          "surface-bright": "#fff9ec",
          "inverse-primary": "#fec4b5",
          "on-surface-variant": "#655f46",
          "on-secondary-fixed-variant": "#615a52",
          "on-error-container": "#6e0a12",
          "on-primary-fixed": "#4f2b21",
          "surface-dim": "#e3daba",
          "secondary-container": "#ebe1d6"
        },
        borderRadius: {
          "DEFAULT": "1rem",
          "lg": "2rem",
          "xl": "3rem",
          "full": "9999px"
        },
        fontFamily: {
          "headline": ["Plus Jakarta Sans"],
          "body": ["Be Vietnam Pro"],
          "label": ["Be Vietnam Pro"]
        }
      }
    }
  }
</script>
<link rel="stylesheet" href="styles.css"/>
<style id="theme-style"></style>
</head>
<body>

<!-- ─────────────── HOME VIEW ─────────────── -->
<div id="view-home" class="view active bg-surface rounded-xl shadow-[0_12px_40px_rgba(55,51,28,0.06)]">

  <!-- TopAppBar -->
  <header class="app-drag w-full h-16 flex items-center px-6 justify-between flex-shrink-0 bg-surface">
    <div class="flex items-center gap-2 app-drag">
      <span class="material-symbols-outlined text-primary" style="font-variation-settings:'FILL' 1;">nest_clock_farsight_analog</span>
      <h1 class="font-headline text-2xl font-bold text-primary tracking-tight">DoroDoro</h1>
    </div>
    <div class="flex gap-4 app-no-drag">
      <button id="home-settings-btn" class="text-on-surface-variant hover:scale-110 transition-transform">
        <span class="material-symbols-outlined">settings</span>
      </button>
      <button class="text-on-surface-variant hover:scale-110 transition-transform" onclick="window.close()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
  </header>

  <!-- Content -->
  <div class="flex-1 px-10 py-4 flex flex-col justify-center gap-8 relative app-no-drag">

    <!-- Hero -->
    <div class="space-y-1">
      <h2 class="font-headline text-3xl font-extrabold text-on-surface tracking-tight" data-i18n="setup-title">Setup Session</h2>
      <p class="text-on-surface-variant font-medium" data-i18n="setup-subtitle">Ready for some deep work?</p>
    </div>

    <!-- Focus Hearth -->
    <div class="bg-tertiary-container rounded-xl relative overflow-hidden py-4 px-6">
      <div class="absolute -bottom-4 -right-4 rotate-12 opacity-20 pointer-events-none">
        <span class="material-symbols-outlined text-primary text-8xl">menu_book</span>
      </div>

      <div class="grid relative z-10">
        <!-- Focus + Break row -->
        <div class="grid grid-cols-2 gap-4 w-full relative z-10">

          <!-- Focus Time -->
          <div class="space-y-2">
            <label class="text-[10px] font-bold uppercase tracking-wider text-on-tertiary-container flex items-center gap-2 px-1">
              <span class="material-symbols-outlined text-xs">potted_plant</span>
              <span data-i18n="label-focus">Focus</span>
            </label>
            <div class="relative flex items-center bg-surface-container-lowest rounded-md">
              <input id="input-focus" class="w-full bg-transparent border-none rounded-md py-2 pl-3 pr-8 text-primary font-bold text-base focus:ring-0" readonly type="text" value="25 min" data-value="25"/>
              <div class="absolute right-1 flex flex-col">
                <button class="text-primary hover:bg-primary/10 rounded-sm leading-none flex items-center justify-center h-4 btn-up" data-target="input-focus" data-min="1" data-max="60" data-suffix=" min">
                  <span class="material-symbols-outlined text-[16px]">expand_less</span>
                </button>
                <button class="text-primary hover:bg-primary/10 rounded-sm leading-none flex items-center justify-center h-4 btn-down" data-target="input-focus" data-min="1" data-max="60" data-suffix=" min">
                  <span class="material-symbols-outlined text-[16px]">expand_more</span>
                </button>
              </div>
            </div>
          </div>

          <!-- Break Time -->
          <div class="space-y-2">
            <label class="text-[10px] font-bold uppercase tracking-wider text-on-tertiary-container flex items-center gap-2 px-1">
              <span class="material-symbols-outlined text-xs">coffee</span>
              <span data-i18n="label-break">Break</span>
            </label>
            <div class="relative flex items-center bg-surface-container-lowest rounded-md">
              <input id="input-break" class="w-full bg-transparent border-none rounded-md py-2 pl-3 pr-8 text-primary font-bold text-base focus:ring-0" readonly type="text" value="5 min" data-value="5"/>
              <div class="absolute right-1 flex flex-col">
                <button class="text-primary hover:bg-primary/10 rounded-sm leading-none flex items-center justify-center h-4 btn-up" data-target="input-break" data-min="1" data-max="30" data-suffix=" min">
                  <span class="material-symbols-outlined text-[16px]">expand_less</span>
                </button>
                <button class="text-primary hover:bg-primary/10 rounded-sm leading-none flex items-center justify-center h-4 btn-down" data-target="input-break" data-min="1" data-max="30" data-suffix=" min">
                  <span class="material-symbols-outlined text-[16px]">expand_more</span>
                </button>
              </div>
            </div>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4 w-full relative z-10">
            <!-- Cycles row -->
             <div class="w-full mt-4 relative z-10">
              <div class="space-y-2">
                <label class="text-[10px] font-bold uppercase tracking-wider text-on-tertiary-container flex items-center gap-2 px-1">
                  <span class="material-symbols-outlined text-xs">autorenew</span>
                  <span data-i18n="label-cycles">Cycles</span>
                </label>
                <div class="relative flex items-center bg-surface-container-lowest rounded-md">
                  <input id="input-cycles" class="w-full bg-transparent border-none rounded-md py-2 pl-3 pr-8 text-primary font-bold text-base focus:ring-0" readonly type="text" value="4" data-value="4"/>
                  <div class="absolute right-1 flex flex-col">
                    <button class="text-primary hover:bg-primary/10 rounded-sm leading-none flex items-center justify-center h-4 btn-up" data-target="input-cycles" data-min="1" data-max="10" data-suffix="">
                      <span class="material-symbols-outlined text-[16px]">expand_less</span>
                    </button>
                    <button class="text-primary hover:bg-primary/10 rounded-sm leading-none flex items-center justify-center h-4 btn-down" data-target="input-cycles" data-min="1" data-max="10" data-suffix="">
                      <span class="material-symbols-outlined text-[16px]">expand_more</span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
            <div class="w-full mt-4 flex flex-col items-center ">
              <img class="w-14" src="../img/ñoqui.gif" alt="">
            </div>
        </div>
      </div>
    </div>

    <!-- Start button -->
    <div class="flex flex-col items-center gap-4">
      <button id="btn-start" class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary py-5 rounded-full font-headline font-bold text-xl shadow-[0_12px_40px_rgba(55,51,28,0.06)] hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3">
        <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">play_circle</span>
        <span data-i18n="btn-start">Start Session</span>
      </button>
    </div>
  </div>
</div>


<!-- ─────────────── FOCUS VIEW ─────────────── -->
<div id="view-focus" class="view app-drag bg-surface-container-low rounded-xl shadow-[0_12px_40px_rgba(55,51,28,0.06)] border-8 border-white relative items-center justify-between p-10">

  <!-- Header -->
  <header class="app-drag w-full flex justify-between items-center h-8">
    <span class="text-primary font-headline text-lg font-bold tracking-tight app-drag">DoroDoro</span>
    <div class="flex gap-4 app-no-drag">
      <span id="focus-cycle-indicator" class="text-on-surface-variant font-label text-sm font-medium"></span>
      <span id="focus-settings-btn" class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:scale-110 transition-transform">settings</span>
      <button class="text-on-surface-variant hover:scale-105 transition-transform" onclick="window.close()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
  </header>

  <!-- Focus label -->
  <div class="flex flex-col items-center gap-1 mt-2 app-no-drag">
    <span class="font-headline font-bold text-on-surface-variant tracking-[0.2em] text-xs" data-i18n="mode-focus">FOCUS</span>
    <div class="w-8 h-1 bg-primary-container rounded-full"></div>
  </div>

  <!-- Timer ring -->
  <div class="relative flex items-center justify-center w-64 h-64 app-no-drag">
    <div class="absolute inset-0 bg-surface-container-highest rounded-full scale-105 opacity-30"></div>
    <svg class="absolute inset-0 w-full h-full" viewBox="0 0 100 100">
      <circle id="focus-track" cx="50" cy="50" fill="transparent" r="43" stroke="#ebe3c2" stroke-width="4.5"></circle>
      <circle id="focus-ring" class="progress-ring" cx="50" cy="50" fill="transparent" r="43"
        stroke="url(#timerGradient)" stroke-linecap="round" stroke-width="4.5"
        stroke-dasharray="270.18" stroke-dashoffset="0"></circle>
      <defs>
        <linearGradient id="timerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#805449"/>
          <stop offset="100%" stop-color="#fec4b5"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="z-10 flex flex-col items-center">
      <span id="focus-timer" class="font-headline text-6xl font-extrabold text-on-surface leading-none">25:00</span>
    </div>
  </div>

  <!-- Buttons -->
  <div class="flex gap-4 w-full justify-center mb-2 mt-4 app-no-drag">
    <button id="focus-pause" class="flex items-center gap-3 px-8 py-4 bg-surface-container-lowest text-on-surface font-medium rounded-xl hover:scale-[1.02] active:scale-95 transition-all shadow-[0_12px_40px_rgba(55,51,28,0.06)]">
      <span class="material-symbols-outlined" id="focus-pause-icon">pause</span>
      <span id="focus-pause-text" data-i18n="btn-pause">Pause</span>
    </button>
    <button id="focus-stop" class="flex items-center gap-3 px-8 py-4 bg-surface-container-highest text-on-surface font-medium rounded-xl hover:scale-[1.02] active:scale-95 transition-all">
      <span class="material-symbols-outlined">stop</span>
      <span data-i18n="btn-stop">Stop</span>
    </button>
  </div>
</div>


<!-- ─────────────── BREAK VIEW ─────────────── -->
<div id="view-break" class="view app-drag bg-surface-container-low rounded-xl shadow-[0_12px_40px_rgba(55,51,28,0.06)] border-8 border-white relative items-center justify-between p-10">

  <!-- Header -->
  <header class="app-drag w-full flex justify-between items-center h-8">
    <span class="text-primary font-headline text-lg font-bold tracking-tight app-drag">DoroDoro</span>
    <div class="flex gap-4 app-no-drag">
      <span id="break-cycle-indicator" class="text-on-surface-variant font-label text-sm font-medium"></span>
      <span id="break-settings-btn" class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:scale-110 transition-transform">settings</span>
      <button class="text-on-surface-variant hover:scale-105 transition-transform" onclick="window.close()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
  </header>

  <!-- Break label -->
  <div class="flex flex-col items-center gap-1 mt-2 app-no-drag">
    <span class="font-headline font-bold text-on-surface-variant tracking-[0.2em] text-xs" data-i18n="mode-break">BREAK</span>
    <div class="w-8 h-1 bg-primary-container rounded-full"></div>
  </div>

  <!-- Timer ring -->
  <div class="relative flex items-center justify-center w-64 h-64 app-no-drag">
    <div class="absolute inset-0 bg-surface-container-highest rounded-full scale-105 opacity-30"></div>
    <svg class="absolute inset-0 w-full h-full" viewBox="0 0 100 100">
      <circle id="break-track" cx="50" cy="50" fill="transparent" r="43" stroke="#ebe3c2" stroke-width="4.5"></circle>
      <circle id="break-ring" class="progress-ring" cx="50" cy="50" fill="transparent" r="43"
        stroke="#805449" stroke-linecap="round" stroke-width="4.5"
        stroke-dasharray="270.18" stroke-dashoffset="0"></circle>
    </svg>
    <div class="z-10 flex flex-col items-center">
      <span id="break-timer" class="font-headline text-6xl font-extrabold text-on-surface leading-none">05:00</span>
      <span class="text-on-surface-variant text-sm font-medium mt-2" data-i18n="break-subtitle">Time to rest</span>
    </div>
  </div>

  <!-- Buttons -->
  <div class="flex gap-4 w-full justify-center mb-2 mt-4 app-no-drag">
    <button id="break-pause" class="flex items-center gap-3 px-8 py-4 bg-surface-container-lowest text-on-surface font-medium rounded-xl hover:scale-[1.02] active:scale-95 transition-all shadow-[0_12px_40px_rgba(55,51,28,0.06)]">
      <span class="material-symbols-outlined" id="break-pause-icon">pause</span>
      <span id="break-pause-text" data-i18n="btn-pause">Pause</span>
    </button>
    <button id="break-stop" class="flex items-center gap-3 px-8 py-4 bg-surface-container-highest text-on-surface font-medium rounded-xl hover:scale-[1.02] active:scale-95 transition-all">
      <span class="material-symbols-outlined">stop</span>
      <span data-i18n="btn-stop">Stop</span>
    </button>
  </div>

  <!-- Decorative blur -->
  <div class="absolute bottom-0 right-0 w-32 h-32 pointer-events-none translate-x-8 translate-y-8">
    <div class="w-full h-full bg-primary-container opacity-20 rounded-full blur-3xl"></div>
  </div>
</div>


<!-- ─────────────── SETTINGS VIEW ─────────────── -->
<div id="view-settings" class="view bg-surface-container-low rounded-xl shadow-[0_12px_40px_rgba(55,51,28,0.06)] relative overflow-hidden items-center p-8">

  <!-- Decorative blurs -->
  <div class="absolute -top-12 -left-12 w-32 h-32 bg-primary-container/20 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute -bottom-12 -right-12 w-40 h-40 bg-secondary-container/30 rounded-full blur-3xl pointer-events-none"></div>

  <!-- Header -->
  <header class="app-drag flex justify-between items-center w-full mb-8 relative z-10">
    <h1 class="font-headline font-bold text-2xl tracking-tight text-on-surface" data-i18n="settings-title">Settings</h1>
    <div class="flex gap-2 app-no-drag">
      <button id="settings-back-btn" class="text-on-surface-variant hover:scale-105 transition-transform">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
      <button class="text-on-surface-variant hover:scale-105 transition-transform" onclick="window.close()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
  </header>

  <!-- Content -->
  <div class="w-full flex-1 space-y-6 relative z-10 app-no-drag">

    <!-- Theme block -->
    <section class="bg-surface-container-lowest p-6 rounded-lg flex flex-col gap-4">
      <label class="font-headline font-bold text-sm uppercase tracking-widest text-on-surface-variant" data-i18n="settings-theme">Theme</label>
      <div class="grid grid-cols-2 gap-2">
        <button class="theme-btn active-theme py-2.5 px-4 rounded-full bg-gradient-to-br from-primary to-primary-container text-white font-bold flex items-center justify-center gap-2 transition-all hover:scale-[1.02] active:scale-95 text-xs" data-theme="noqui">
          <span class="material-symbols-outlined text-sm">light_mode</span>
          Ñoqui
        </button>
        <button class="theme-btn py-2.5 px-4 rounded-full bg-surface-container-high text-on-surface font-medium flex items-center justify-center gap-2 transition-all hover:scale-[1.02] active:scale-95 text-xs" data-theme="chloe">
          <span class="material-symbols-outlined text-sm">deceased</span>
          Chloe
        </button>
        <button class="theme-btn py-2.5 px-4 rounded-full bg-surface-container-high text-on-surface font-medium flex items-center justify-center gap-2 transition-all hover:scale-[1.02] active:scale-95 text-xs" data-theme="max">
          <span class="material-symbols-outlined text-sm">tsunami</span>
          Max
        </button>
        <button class="theme-btn py-2.5 px-4 rounded-full bg-surface-container-high text-on-surface font-medium flex items-center justify-center gap-2 transition-all hover:scale-[1.02] active:scale-95 text-xs" data-theme="black">
          <span class="material-symbols-outlined text-sm">dark_mode</span>
          Black
        </button>
      </div>
    </section>

    <!-- Language + Volume row -->
    <div class="grid grid-cols-2 gap-4">

      <!-- Language -->
      <section class="bg-surface-container-lowest p-5 rounded-lg flex flex-col justify-between h-32">
        <label class="font-headline font-bold text-xs uppercase tracking-widest text-on-surface-variant" data-i18n="settings-language">Language</label>
        <div class="flex gap-2">
          <button id="lang-es" class="lang-btn flex-1 py-2.5 rounded-full text-xs font-medium bg-surface-container text-on-surface transition-all hover:scale-[1.02] active:scale-95">ES</button>
          <button id="lang-en" class="lang-btn flex-1 py-2.5 rounded-full text-xs font-medium bg-surface-container text-on-surface transition-all hover:scale-[1.02] active:scale-95">EN</button>
        </div>
      </section>

      <!-- Volume -->
      <section class="bg-surface-container-lowest p-5 rounded-lg flex flex-col justify-between h-32">
        <label class="font-headline font-bold text-xs uppercase tracking-widest text-on-surface-variant" data-i18n="settings-volume">Volume</label>
        <div class="flex flex-col gap-2 items-center">
          <input id="volume-slider" class="w-full bg-surface-container" type="range" min="0" max="100" value="75"/>
          <div class="w-full flex justify-between px-1">
            <span class="material-symbols-outlined text-xs text-on-surface-variant">volume_mute</span>
            <span class="material-symbols-outlined text-xs text-on-surface-variant">volume_up</span>
          </div>
        </div>
      </section>

      <section class="bg-surface-container-lowest p-2 rounded-lg flex flex-col">
          <label class="font-headline font-bold text-sm text-on-surface-variant text-center">Hecho con <3 para Paula </label>
      </section >
      <section class="bg-surface-container-lowest p-2 rounded-lg flex flex-col">
          <label class="font-headline font-bold text-sm text-on-surface-variant text-center">Creado por <strong><a href="www.javierportafolio.com" target="_blank">Javier</a></strong></label>
      </section >
    </div>
  </div>
</div>
<script src="app.js"></script>

</body>
</html>
